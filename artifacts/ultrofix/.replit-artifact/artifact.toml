kind = "web"
previewPath = "/"
title = "Ultrofix Tech Services"
version = "1.0.0"
id = "artifacts/ultrofix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22777

[services.development]
run = "pnpm --filter @workspace/ultrofix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ultrofix", "run", "build" ]
publicDir = "artifacts/ultrofix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22777"
BASE_PATH = "/"
